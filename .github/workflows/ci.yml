name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r backend/requirements.txt
      - name: pytest
        working-directory: backend
        run: pytest

  ingestion:
    name: Ingestion helper tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      # Helper tests only need pandas (not the heavy FastF1 stack).
      - run: pip install pandas==2.2.2 pytest==8.2.2
      - name: pytest
        working-directory: ingestion-service
        run: pytest

  frontend:
    name: Frontend typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
        working-directory: frontend
      - name: TypeScript typecheck
        working-directory: frontend
        run: npx tsc --noEmit
