services:
  db:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_DB: apex
      POSTGRES_USER: apex
      POSTGRES_PASSWORD: password
    volumes: ["pgdata:/var/lib/postgresql/data"]
    ports: ["5432:5432"]

  redis:
    image: redis:7-alpine

  backend:
    build: ./backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes: ["./backend:/app"]
    env_file: .env
    depends_on: [db, redis]
    ports: ["8000:8000"]

  celery:
    build: ./backend
    command: celery -A config worker -l info
    volumes: ["./backend:/app"]
    env_file: .env
    depends_on: [db, redis]

  celery-beat:
    build: ./backend
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes: ["./backend:/app"]
    env_file: .env
    depends_on: [db, redis]

  ingestion-service:
    build: ./ingestion-service
    volumes:
      - ./ingestion-service:/app
      - fastf1-cache:/data/fastf1-cache
    env_file: .env
    depends_on: [db]

  frontend:
    build: ./frontend
    command: npm run dev
    volumes: ["./frontend:/app", "/app/node_modules"]
    env_file: .env
    ports: ["3000:3000"]

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx/apex.conf:/etc/nginx/conf.d/default.conf:ro
    ports: ["80:80"]
    depends_on: [backend, frontend]

volumes:
  pgdata:
  fastf1-cache:
