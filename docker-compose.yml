services:
  db:
    restart: unless-stopped
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_DB: apex
      POSTGRES_USER: apex
      POSTGRES_PASSWORD: password
    volumes: ["pgdata:/var/lib/postgresql/data"]
    ports: ["15433:5432"]

  redis:
    restart: unless-stopped
    image: redis:7-alpine

  backend:
    restart: unless-stopped
    build: ./backend
    image: apex-backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes: ["./backend:/app"]
    env_file: .env
    depends_on: [db, redis]
    ports: ["18080:8000"]

  # celery and celery-beat reuse the backend image (same code) instead of
  # building it again.
  celery:
    restart: unless-stopped
    image: apex-backend
    command: celery -A config worker -l info
    volumes: ["./backend:/app"]
    env_file: .env
    depends_on: [backend, db, redis]

  celery-beat:
    restart: unless-stopped
    image: apex-backend
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes: ["./backend:/app"]
    env_file: .env
    depends_on: [backend, db, redis]

  ingestion-service:
    restart: unless-stopped
    build: ./ingestion-service
    volumes:
      - ./ingestion-service:/app
      - fastf1-cache:/data/fastf1-cache
    env_file: .env
    depends_on: [db]

  frontend:
    restart: unless-stopped
    build: ./frontend
    command: npm run dev
    volumes: ["./frontend:/app", "/app/node_modules"]
    env_file: .env
    ports: ["13001:3000"]

  nginx:
    restart: unless-stopped
    image: nginx:alpine
    volumes:
      - ./nginx/apex.conf:/etc/nginx/conf.d/default.conf:ro
    ports: ["18081:80"]
    depends_on: [backend, frontend]

volumes:
  pgdata:
  fastf1-cache:
